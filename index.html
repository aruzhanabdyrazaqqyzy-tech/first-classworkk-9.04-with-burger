<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel UI</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#fce7f3;
}

header{
    background:white;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    position:relative;
}

.logo{
    display:flex;
    align-items:center;
    gap:8px;
}

.logo img{
    width:40px;
}

.logo h3{
    font-size:20px;
    color:black;
}

.nav{
    display:flex;
    gap:28px;
}

.nav h3{
    font-size:16px;
    font-weight:600;
    color:black;
    cursor:pointer;
}

.buttn{
    position:absolute;
    top:10px;
    right:10px;
    display:none;
    background:none;
    border:none;
    cursor:pointer;
}

.buttn img{
    width:30px;
}

.main{
    display:flex;
    flex-direction:row;
    gap:20px;
    padding:5px;
    width: 100%;

}
.panel{
    background-color: white;
    border-radius: 10px;
    width: 20%;
    padding: 10px;
}
 .hidden{
        display: none;
    }
    

@media(max-width:500px){
    .main{
         display:flex;
        flex-direction: column;
        gap:20px;
        align-items: center;
        justify-content: center;
    }
    .nav{
        display:none;
        flex-direction:column;
        position:absolute;
        top:60px;
        right:10px;
       
    }
    .buttn{
        display:block;
    }
    
   
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="">
        <h3>wheelofnames.com</h3>
    </div>

    <button class="buttn">
        <img src="menu_icon.png" alt="menu_icon" class="menu_icon">
    </button>

    <div class="nav">
        <h3>Customize</h3>
        <h3>New</h3>
        <h3>Open</h3>
        <h3>Save</h3>
        <h3>Share</h3>
        <h3>Gallery</h3>
        <h3>More</h3>
        <h3>English</h3>
    </div>
</header>

<div class="main">

    <div class="left-panel">
        <img src="pen_icon.png" style="width: 30px;">
        <div class="left-links">
            <span>Report bad ad</span>
            <span>Close ads</span>
        </div>
        <img src="reklama.png" width="240">
    </div>

    <img class="wheel" src="ruletka.png" style="width: 50%;">

    <div class="panel">

        <div class="panel-top">
            <div class="block">
                <h3>Entries <span class="badge">23</span></h3>
                <div class="line"></div>
            </div>

            <div class="block">
                <h3>Results <span class="badge">2</span></h3>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn">Shuffle</button>
            <button class="btn">Sort</button>
            <button class="btn">Add image</button>
        </div>

        <div class="checkbox">
            <input type="checkbox">
            <span>Advanced</span>
        </div>

        <div class="list">
            <p>eljan</p>
            <p>eljan</p>
            <p>eljan</p>
            <p>eljan</p>
            <p>eljan</p>
            <p>eljan</p>
        </div>

        <button class="btn">Add wheel</button>

    </div>

</div>

<script>
const btn = document.querySelector(".buttn")
const nav = document.querySelector("nav")
const img = document.querySelector(".menu_icon")

btn.addEventListener("click", function(){
    const openNav = nav.classList.toggle("hidden");
    img.src = openNav === true ? "menu_icon.png" : "close_icon.png";
});
</script>

</body>
</html>
